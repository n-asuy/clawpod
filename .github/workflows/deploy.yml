name: Deploy

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: clawpod
  REMOTE_HOST: REDACTED
  REMOTE_USER: root
  REMOTE_BIN_PATH: /usr/local/bin/clawpod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p runtime

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer binary
        run: |
          scp -i ~/.ssh/deploy_key \
            target/release/runtime \
            ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }}:/tmp/clawpod_new

      - name: Deploy and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} << 'DEPLOY'
            set -euo pipefail
            systemctl stop clawpod
            mv /tmp/clawpod_new ${{ env.REMOTE_BIN_PATH }}
            chmod +x ${{ env.REMOTE_BIN_PATH }}
            systemctl start clawpod
            sleep 2
            systemctl is-active clawpod
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
