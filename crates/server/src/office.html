<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClawPod Office</title>
<style>
:root {
  --sidebar-w: 220px;
  --header-h: 48px;
  --radius: 8px;
  --transition: 150ms ease;
}

[data-theme="dark"] {
  --bg: #0f1117;
  --bg-surface: #1a1d27;
  --bg-card: #222533;
  --bg-hover: #2a2d3d;
  --border: #2e3144;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --text-muted: #5c6078;
  --accent: #6c8aff;
  --accent-dim: #4a62c4;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --badge-green-bg: rgba(74, 222, 128, .15);
  --badge-red-bg: rgba(248, 113, 113, .15);
  --badge-yellow-bg: rgba(251, 191, 36, .15);
  --badge-blue-bg: rgba(108, 138, 255, .15);
  --badge-gray-bg: rgba(139, 143, 163, .15);
  --shadow: 0 4px 12px rgba(0, 0, 0, .3);
}

[data-theme="light"] {
  --bg: #f5f6f8;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f0f1f4;
  --border: #e0e2e8;
  --text: #1a1d27;
  --text-dim: #555a6e;
  --text-muted: #8b8fa3;
  --accent: #4a6cf7;
  --accent-dim: #3b5ad9;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #d97706;
  --orange: #ea580c;
  --badge-green-bg: rgba(34, 197, 94, .12);
  --badge-red-bg: rgba(239, 68, 68, .12);
  --badge-yellow-bg: rgba(217, 119, 6, .12);
  --badge-blue-bg: rgba(74, 108, 247, .1);
  --badge-gray-bg: rgba(139, 143, 163, .1);
  --shadow: 0 4px 12px rgba(0, 0, 0, .08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
}

/* Layout */
.layout {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}

.sidebar-header span { color: var(--accent); margin-right: 6px; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.nav-section {
  margin-top: 12px;
  margin-bottom: 4px;
  padding: 0 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 13px;
  transition: background var(--transition), color var(--transition);
  user-select: none;
}

.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: #fff; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

.sidebar-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.connection-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}

.status-dot.ok { background: var(--green); }
.status-dot.error { background: var(--red); }

/* Main content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.main-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.page-title { font-weight: 600; font-size: 16px; }

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 13px;
}

.card-body { padding: 16px; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

/* Stat cards */
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--yellow); }

/* Tables */
.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 8px 12px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.5;
}

.badge-green { background: var(--badge-green-bg); color: var(--green); }
.badge-red { background: var(--badge-red-bg); color: var(--red); }
.badge-yellow { background: var(--badge-yellow-bg); color: var(--yellow); }
.badge-blue { background: var(--badge-blue-bg); color: var(--accent); }
.badge-gray { background: var(--badge-gray-bg); color: var(--text-dim); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: background var(--transition);
}

.btn:hover { background: var(--bg-hover); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dim); }
.btn-danger { background: var(--badge-red-bg); border-color: var(--red); color: var(--red); }
.btn-danger:hover { opacity: .85; }
.btn-sm { padding: 3px 10px; font-size: 12px; }

.btn-group { display: flex; gap: 6px; }

/* Forms */
.form-row { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}

.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 60px; }

.settings-layout { display: flex; flex-direction: column; gap: 16px; }
.settings-inline-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.settings-subsection {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
}
.settings-subsection + .settings-subsection { margin-top: 12px; }
.settings-subtitle {
  margin-bottom: 10px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.settings-help {
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.5;
}
.settings-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.settings-toolbar {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

/* Dialog / Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 480px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}

.modal-body { padding: 20px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px;
}

.modal-close:hover { color: var(--text); }

/* Events log */
.event-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.event-item:last-child { border-bottom: none; }

.event-time {
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'SF Mono', 'Menlo', monospace;
  white-space: nowrap;
  flex-shrink: 0;
}

.event-type {
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.event-payload {
  color: var(--text-dim);
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Chat */
.chat-container { display: flex; flex-direction: column; height: 100%; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.chain-step {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.chain-step-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.chain-step-agent {
  font-weight: 600;
  color: var(--accent);
}

.chain-step-index {
  color: var(--text-muted);
  font-family: 'SF Mono', 'Menlo', monospace;
}

.chain-step-body {
  padding: 8px 12px;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
}

.chain-step-input {
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Misc */
.empty { color: var(--text-muted); font-size: 13px; padding: 24px 0; text-align: center; }
.mono { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-dim { color: var(--text-dim); }
.text-muted { color: var(--text-muted); }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }
.hidden { display: none !important; }

/* Clickable rows */
.clickable-row { cursor: pointer; }
.clickable-row:hover { background: var(--bg-surface); }

/* Event timeline */
.event-timeline { max-height: 600px; overflow-y: auto; }
.event-entry { border-left: 3px solid var(--border); padding: 8px 12px; margin-bottom: 2px; }
.event-entry:last-child { margin-bottom: 0; }
.event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.event-icon { font-size: 14px; width: 20px; text-align: center; }
.event-type { font-size: 12px; font-weight: 600; text-transform: capitalize; }
.event-seq { font-size: 11px; color: var(--text-muted); }
.event-time { font-size: 11px; margin-left: auto; }
.event-body { padding-left: 28px; font-size: 13px; }
.event-pre { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 12px; font-family: 'SF Mono','Menlo',monospace; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow: auto; margin: 4px 0; }
.event-output { font-family: 'SF Mono','Menlo',monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow: auto; background: var(--bg); padding: 6px; border-radius: 4px; }
.event-message { white-space: pre-wrap; word-break: break-word; }
.event-thinking { font-style: italic; color: var(--text-dim); white-space: pre-wrap; max-height: 100px; overflow: auto; }
.event-filters { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.event-tool_call { border-left-color: var(--accent); }
.event-tool_result { border-left-color: var(--green); }
.event-agent_message { border-left-color: #a78bfa; }
.event-thinking { border-left-color: var(--text-muted); }
.event-completed { border-left-color: var(--green); }
.event-failed { border-left-color: var(--red); }
.token-summary { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 12px; font-family: 'SF Mono','Menlo',monospace; display: inline-block; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 10px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: toast-in .2s ease;
}

.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

@keyframes toast-in {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

[data-theme="light"] .card {
  box-shadow: 0 1px 3px rgba(0, 0, 0, .06);
}

[data-theme="light"] .sidebar {
  box-shadow: 1px 0 3px rgba(0, 0, 0, .04);
}

/* Theme toggle */
.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 14px;
  transition: color var(--transition), border-color var(--transition);
  line-height: 1;
}

.theme-toggle:hover { color: var(--text); border-color: var(--text-dim); }

/* Responsive */
.menu-toggle {
  display: none;
  background: none; border: none; color: var(--text); font-size: 22px;
  cursor: pointer; padding: 4px 8px; margin-right: 8px; line-height: 1;
}
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99;
}
.sidebar-overlay.open { display: block; }

@media (max-width: 768px) {
  .menu-toggle { display: inline-block; }
  .sidebar {
    position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100;
    width: 250px; min-width: 250px;
    transition: left .2s ease;
  }
  .sidebar.open { left: 0; }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

/* Run Detail */
.run-header { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
.run-header .badge { font-size: 13px; }
.run-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px 24px; margin-bottom: 16px; font-size: 13px; }
.run-meta dt { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.run-meta dd { margin: 0 0 4px; word-break: break-all; }

.run-timeline { display: flex; flex-direction: column; gap: 2px; }

.run-ev {
  display: grid;
  grid-template-columns: 90px 100px 1fr;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 13px;
  transition: background var(--transition);
}
.run-ev:hover { background: var(--bg-hover); }
.run-ev-time { color: var(--text-muted); font-family: 'SF Mono','Menlo',monospace; font-size: 12px; white-space: nowrap; }
.run-ev-type { font-weight: 600; white-space: nowrap; }
.run-ev-body { color: var(--text-dim); font-family: 'SF Mono','Menlo',monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.run-ev-body.expanded { white-space: pre-wrap; word-break: break-all; }

.ev-tool_call .run-ev-type { color: var(--accent); }
.ev-tool_result .run-ev-type { color: var(--green); }
.ev-agent_message .run-ev-type { color: var(--yellow); }
.ev-thinking .run-ev-type { color: var(--text-muted); font-style: italic; }
.ev-completed .run-ev-type { color: var(--green); }
.ev-failed .run-ev-type { color: var(--red); }
.ev-text_chunk .run-ev-type { color: var(--text-dim); }

.run-prompt-box, .run-output-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 16px;
  font-family: 'SF Mono','Menlo',monospace;
  font-size: 12px;
  max-height: 150px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
}

.run-filter-bar {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center;
}
.run-filter-bar label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-dim); cursor: pointer; }
.run-filter-bar label:hover { color: var(--text); }
.run-filter-bar input[type="checkbox"] { accent-color: var(--accent); }
.run-filter-bar input[type="text"] {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; font-size: 12px; color: var(--text); outline: none; width: 180px;
}
.run-filter-bar input[type="text"]:focus { border-color: var(--accent); }

.run-token-summary { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-dim); }
.run-token-summary b { color: var(--text); font-weight: 600; }

.run-live-indicator {
  display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent);
}
.run-live-indicator::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  animation: pulse-dot 1.5s infinite;
}
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

tr.clickable-row { cursor: pointer; }
tr.clickable-row:hover td { background: var(--bg-hover); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header"><span>&#9654;</span> ClawPod</div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">&#9632;</span> Dashboard
      </div>
      <div class="nav-item" data-page="events" onclick="navigate('events')">
        <span class="nav-icon">&#9881;</span> Events
      </div>

      <div class="nav-section">Configuration</div>
      <div class="nav-item" data-page="agents" onclick="navigate('agents')">
        <span class="nav-icon">&#9673;</span> Agents
      </div>
      <div class="nav-item" data-page="teams" onclick="navigate('teams')">
        <span class="nav-icon">&#9733;</span> Teams
      </div>
      <div class="nav-item" data-page="bindings" onclick="navigate('bindings')">
        <span class="nav-icon">&#128279;</span> Bindings
      </div>
      <div class="nav-item" data-page="settings" onclick="navigate('settings')">
        <span class="nav-icon">&#9881;</span> Settings
      </div>

      <div class="nav-section">Runtime</div>
      <div class="nav-item" data-page="runs" onclick="navigate('runs')">
        <span class="nav-icon">&#9654;</span> Runs
      </div>
      <div class="nav-item" data-page="sessions" onclick="navigate('sessions')">
        <span class="nav-icon">&#8644;</span> Sessions
      </div>
      <div class="nav-item" data-page="responses" onclick="navigate('responses')">
        <span class="nav-icon">&#9993;</span> Responses
      </div>
      <div class="nav-item" data-page="heartbeat" onclick="navigate('heartbeat')">
        <span class="nav-icon">&#9829;</span> Heartbeat
      </div>
      <div class="nav-item" data-page="access" onclick="navigate('access')">
        <span class="nav-icon">&#128274;</span> Access
      </div>

      <div class="nav-section">Collaboration</div>
      <div class="nav-item" data-page="chatroom" onclick="navigate('chatroom')">
        <span class="nav-icon">&#128172;</span> Chatroom
      </div>
    </nav>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="connection-status">
          <span class="status-dot" id="sse-dot"></span>
          <span id="sse-label">Connecting...</span>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <span class="page-title" id="page-title">Dashboard</span>
      <div id="header-actions"></div>
    </div>
    <div class="main-content" id="page-container"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
(function() {
  'use strict';

  /* ── Helpers ── */
  const $ = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => [...(root || document).querySelectorAll(sel)];

  const params = new URLSearchParams(location.search);
  const TOKEN = params.get('token') || '';

  function apiUrl(path) {
    const u = new URL(path, location.origin);
    if (TOKEN) u.searchParams.set('token', TOKEN);
    return u.toString();
  }

  function authHeaders() {
    const h = { 'Content-Type': 'application/json' };
    if (TOKEN) h['Authorization'] = `Bearer ${TOKEN}`;
    return h;
  }

  async function api(method, path, body) {
    const opts = { method, headers: authHeaders() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(apiUrl(path), opts);
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`${res.status}: ${text}`);
    }
    return res.json();
  }

  const GET = (p) => api('GET', p);
  const POST = (p, b) => api('POST', p, b);
  const PUT = (p, b) => api('PUT', p, b);
  const DEL = (p) => api('DELETE', p);

  function toast(msg, type) {
    const el = document.createElement('div');
    el.className = `toast ${type || ''}`;
    el.textContent = msg;
    $('#toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function fmtTime(iso) {
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return iso; }
  }

  function fmtDateTime(iso) {
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }

  function statusBadge(status) {
    const s = (status || '').toLowerCase();
    if (s === 'succeeded' || s === 'ok' || s === 'approved' || s === 'running') {
      const cls = s === 'running' ? 'badge-blue' : 'badge-green';
      return `<span class="badge ${cls}">${status}</span>`;
    }
    if (s === 'failed' || s === 'error' || s === 'rejected') {
      return `<span class="badge badge-red">${status}</span>`;
    }
    if (s === 'pending' || s === 'pending_approval') {
      return `<span class="badge badge-yellow">${status}</span>`;
    }
    return `<span class="badge badge-gray">${status}</span>`;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.slice(0, len) + '...' : str;
  }

  /* ── Modal ── */
  function showModal(title, bodyHtml, footerHtml) {
    const root = $('#modal-root');
    root.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-header">
            <span>${escapeHtml(title)}</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
          </div>
          <div class="modal-body">${bodyHtml}</div>
          ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
        </div>
      </div>`;
  }

  window.closeModal = () => { $('#modal-root').innerHTML = ''; };

  /* ── Navigation ── */
  let currentPage = 'dashboard';
  let pollTimer = null;

  const validPages = new Set([
    'dashboard','events','agents','teams','bindings','settings',
    'runs','run-detail','sessions','responses','heartbeat','access','chatroom',
  ]);

  function pageFromPath() {
    const rest = location.pathname.replace(/^\/office\/?/, '');
    const seg = rest.split('/')[0];
    if (seg === 'run-detail') {
      const runId = rest.split('/')[1];
      if (runId) selectedRunId = runId;
    }
    return validPages.has(seg) ? seg : 'dashboard';
  }

  window.navigate = function(page, pushState = true) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (runEventSource && page !== 'run-detail') { runEventSource.close(); runEventSource = null; }
    currentPage = page;
    if (typeof closeSidebar === 'function') closeSidebar();
    if (pushState) {
      let url = '/office/' + page;
      if (page === 'run-detail' && selectedRunId) url += '/' + selectedRunId;
      history.pushState({ page }, '', url);
    }
    $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    $('#page-title').textContent = pageTitle(page);
    $('#header-actions').innerHTML = '';
    renderPage(page);
  };

  window.addEventListener('popstate', (e) => {
    const page = (e.state && e.state.page) || pageFromPath();
    navigate(page, false);
  });

  function pageTitle(page) {
    const titles = {
      dashboard: 'Dashboard', events: 'Events', agents: 'Agents', teams: 'Teams',
      bindings: 'Bindings', settings: 'Settings', runs: 'Runs', 'run-detail': 'Run Detail', sessions: 'Sessions',
      responses: 'Pending Responses', heartbeat: 'Heartbeat', access: 'Sender Access', chatroom: 'Chatroom',
    };
    return titles[page] || page;
  }

  /* ── Pages ── */
  async function renderPage(page) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    const container = $('#page-container');
    container.innerHTML = '<div class="empty">Loading...</div>';
    try {
      switch (page) {
        case 'dashboard': await renderDashboard(container); break;
        case 'events': await renderEvents(container); break;
        case 'agents': await renderAgents(container); break;
        case 'teams': await renderTeams(container); break;
        case 'bindings': await renderBindings(container); break;
        case 'settings': await renderSettings(container); break;
        case 'runs': await renderRuns(container); break;
        case 'sessions': await renderSessions(container); break;
        case 'responses': await renderResponses(container); break;
        case 'heartbeat': await renderHeartbeat(container); break;
        case 'access': await renderAccess(container); break;
        case 'chatroom': await renderChatroom(container); break;
        case 'run-detail': await renderRunDetail(container); break;
      }
    } catch (err) {
      container.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${escapeHtml(err.message)}</div>`;
    }
  }

  /* Dashboard */
  let modelCatalogCache = null;
  async function loadModelCatalog() {
    if (!modelCatalogCache) {
      const data = await GET('/api/models');
      modelCatalogCache = data.models || [];
    }
    return modelCatalogCache;
  }

  function populateModelSelect(selectEl, provider, currentModel) {
    const models = (modelCatalogCache || []).filter(m => m.provider === provider);
    const isKnown = models.some(m => m.id === currentModel);
    let options = models.map(m =>
      `<option value="${m.id}" ${m.id === currentModel ? 'selected' : ''}>${escapeHtml(m.name)} (${m.id})</option>`
    ).join('');
    options += `<option value="__custom__" ${(!isKnown && currentModel) ? 'selected' : ''}>Custom...</option>`;
    selectEl.innerHTML = options;
    const customRow = document.getElementById('m-agent-model-custom-row');
    if (customRow) {
      if (selectEl.value === '__custom__') {
        customRow.style.display = '';
        document.getElementById('m-agent-model-custom').value = currentModel || '';
      } else {
        customRow.style.display = 'none';
      }
    }
  }

  function setupModelProviderBinding(agent) {
    const currentModel = (agent && agent.model) || '';
    const providerEl = document.getElementById('m-agent-provider');
    const modelEl = document.getElementById('m-agent-model');
    if (!providerEl || !modelEl) return;
    populateModelSelect(modelEl, providerEl.value, currentModel);
    toggleAgentProviderFields();
    toggleAgentHeartbeatFields();
    providerEl.addEventListener('change', () => {
      populateModelSelect(modelEl, providerEl.value, '');
      toggleAgentProviderFields();
    });
    modelEl.addEventListener('change', () => {
      const customRow = document.getElementById('m-agent-model-custom-row');
      if (customRow) customRow.style.display = modelEl.value === '__custom__' ? '' : 'none';
    });
    const heartbeatToggle = document.getElementById('m-agent-heartbeat-enabled');
    if (heartbeatToggle) {
      heartbeatToggle.addEventListener('change', toggleAgentHeartbeatFields);
    }
  }

  function resolveModelValue() {
    const sel = document.getElementById('m-agent-model');
    if (sel && sel.value === '__custom__') {
      return document.getElementById('m-agent-model-custom').value.trim();
    }
    return sel ? sel.value : '';
  }

  function toggleAgentProviderFields() {
    const provider = document.getElementById('m-agent-provider')?.value || '';
    const providerIdRow = document.getElementById('m-agent-provider-id-row');
    if (providerIdRow) providerIdRow.style.display = provider === 'custom' ? '' : 'none';
  }

  function toggleAgentHeartbeatFields() {
    const enabled = !!document.getElementById('m-agent-heartbeat-enabled')?.checked;
    const fields = document.getElementById('m-agent-heartbeat-fields');
    if (fields) fields.style.display = enabled ? '' : 'none';
  }

  function triStateBoolValue(value) {
    return value === true ? 'true' : value === false ? 'false' : '';
  }

  function triStateBoolOptions(value) {
    const current = triStateBoolValue(value);
    return `
      <option value="" ${current === '' ? 'selected' : ''}>Default</option>
      <option value="true" ${current === 'true' ? 'selected' : ''}>True</option>
      <option value="false" ${current === 'false' ? 'selected' : ''}>False</option>`;
  }

  function readTriStateBool(id) {
    const value = document.getElementById(id)?.value || '';
    if (value === 'true') return true;
    if (value === 'false') return false;
    return null;
  }

  function renderAgentProviderSummary(agent) {
    const provider = agent.provider || '';
    if (provider === 'custom' && agent.provider_id) {
      return `<span class="badge badge-blue">custom</span><div class="mono text-dim" style="margin-top:4px">${escapeHtml(agent.provider_id)}</div>`;
    }
    return `<span class="badge badge-blue">${escapeHtml(provider)}</span>`;
  }

  function renderAgentHeartbeatSummary(agent) {
    const hb = agent.heartbeat;
    if (!hb) return '<span class="text-dim">defaults</span>';
    const parts = [];
    if (hb.every) parts.push(hb.every);
    if (hb.target) parts.push(hb.target);
    if (hb.to) parts.push(truncate(hb.to, 18));
    if (hb.direct_policy) parts.push(hb.direct_policy);
    if (parts.length === 0) return '<span class="text-dim">override</span>';
    return `<span class="mono text-dim">${escapeHtml(parts.join(' · '))}</span>`;
  }

  function renderAgentForm(agent, opts) {
    const a = agent || {};
    const hb = a.heartbeat || {};
    const active = hb.active_hours || {};
    const includeId = !!opts?.includeId;
    const think = a.think_level || '';
    const target = hb.target || '';
    const directPolicy = hb.direct_policy || '';
    return `
      ${includeId ? '<div class="form-row"><label class="form-label">ID</label><input class="form-input" id="m-agent-id" placeholder="e.g. researcher"></div>' : ''}
      <div class="form-row"><label class="form-label">Name</label><input class="form-input" id="m-agent-name" value="${escapeHtml(a.name || '')}" placeholder="Agent display name"></div>
      <div class="form-row"><label class="form-label">Provider</label>
        <select class="form-select" id="m-agent-provider">
          ${['anthropic','openai','custom','mock'].map(p => `<option value="${p}" ${p === (a.provider || 'anthropic') ? 'selected' : ''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label class="form-label">Model</label><select class="form-select" id="m-agent-model"></select></div>
      <div class="form-row" id="m-agent-model-custom-row" style="display:none"><label class="form-label">Custom Model ID</label><input class="form-input" id="m-agent-model-custom" placeholder="e.g. claude-sonnet-4-20250514"></div>
      <div class="form-row" id="m-agent-provider-id-row" style="display:none"><label class="form-label">Custom Provider ID</label><input class="form-input" id="m-agent-provider-id" value="${escapeHtml(a.provider_id || '')}" placeholder="required for provider=custom"></div>
      <div class="form-row"><label class="form-label">Think Level</label>
        <select class="form-select" id="m-agent-think-level">
          ${['','off','minimal','low','medium','high','xhigh','adaptive'].map(v => `<option value="${v}" ${v === think ? 'selected' : ''}>${v || 'Default'}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label class="form-label">Browser Profile</label><input class="form-input" id="m-agent-browser-profile" value="${escapeHtml((a.browser && a.browser.profile) || '')}" placeholder="optional; falls back to browser.default_profile"></div>
      <div class="form-row"><label class="form-label">Prompt File</label><input class="form-input" id="m-agent-prompt-file" value="${escapeHtml(a.prompt_file || '')}" placeholder="relative to workspace or absolute"></div>
      <div class="form-row"><label class="form-label">System Prompt</label><textarea class="form-textarea" id="m-agent-system-prompt" style="min-height:120px">${escapeHtml(a.system_prompt || '')}</textarea></div>
      <div style="margin:16px 0 8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)">Heartbeat Override</div>
      <div class="form-row">
        <label class="form-label" for="m-agent-heartbeat-enabled">Enabled</label>
        <label style="display:inline-flex;align-items:center;gap:8px">
          <input type="checkbox" id="m-agent-heartbeat-enabled" ${(a.heartbeat ? 'checked' : '')}>
          <span class="text-dim">Store agent-level heartbeat settings</span>
        </label>
      </div>
      <div id="m-agent-heartbeat-fields" style="display:${a.heartbeat ? '' : 'none'}">
        <div class="form-row"><label class="form-label">Every</label><input class="form-input" id="m-agent-heartbeat-every" value="${escapeHtml(hb.every || '')}" placeholder="e.g. 30m"></div>
        <div class="form-row"><label class="form-label">Model</label><input class="form-input" id="m-agent-heartbeat-model" value="${escapeHtml(hb.model || '')}" placeholder="optional override"></div>
        <div class="form-row"><label class="form-label">Prompt</label><textarea class="form-textarea" id="m-agent-heartbeat-prompt" style="min-height:90px">${escapeHtml(hb.prompt || '')}</textarea></div>
        <div class="form-row"><label class="form-label">Target</label>
          <select class="form-select" id="m-agent-heartbeat-target">
            ${[['','Inherit'],['none','None'],['last','Last'],['telegram','Telegram'],['discord','Discord'],['slack','Slack'],['chatroom','Chatroom']].map(([value,label]) => `<option value="${value}" ${value === target ? 'selected' : ''}>${label}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label class="form-label">To</label><input class="form-input" id="m-agent-heartbeat-to" value="${escapeHtml(hb.to || '')}" placeholder="channel or recipient id"></div>
        <div class="form-row"><label class="form-label">Account ID</label><input class="form-input" id="m-agent-heartbeat-account-id" value="${escapeHtml(hb.account_id || '')}" placeholder="optional account id"></div>
        <div class="form-row"><label class="form-label">Ack Max Chars</label><input class="form-input" id="m-agent-heartbeat-ack-max-chars" type="number" min="1" value="${hb.ack_max_chars || ''}" placeholder="300"></div>
        <div class="form-row"><label class="form-label">Direct Policy</label>
          <select class="form-select" id="m-agent-heartbeat-direct-policy">
            ${[['','Inherit'],['allow','Allow'],['block','Block']].map(([value,label]) => `<option value="${value}" ${value === directPolicy ? 'selected' : ''}>${label}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label class="form-label">Include Reasoning</label><select class="form-select" id="m-agent-heartbeat-include-reasoning">${triStateBoolOptions(hb.include_reasoning)}</select></div>
        <div class="form-row"><label class="form-label">Light Context</label><select class="form-select" id="m-agent-heartbeat-light-context">${triStateBoolOptions(hb.light_context)}</select></div>
        <div class="form-row"><label class="form-label">Isolated Session</label><select class="form-select" id="m-agent-heartbeat-isolated-session">${triStateBoolOptions(hb.isolated_session)}</select></div>
        <div class="form-row"><label class="form-label">Active Start</label><input class="form-input" id="m-agent-heartbeat-active-start" value="${escapeHtml(active.start || '')}" placeholder="09:00"></div>
        <div class="form-row"><label class="form-label">Active End</label><input class="form-input" id="m-agent-heartbeat-active-end" value="${escapeHtml(active.end || '')}" placeholder="18:00"></div>
        <div class="form-row"><label class="form-label">Active Timezone</label><input class="form-input" id="m-agent-heartbeat-active-timezone" value="${escapeHtml(active.timezone || '')}" placeholder="UTC"></div>
      </div>`;
  }

  function applyAgentBrowserProfile(agent) {
    const browserProfile = $('#m-agent-browser-profile').value.trim();
    if (browserProfile) {
      agent.browser = { profile: browserProfile };
    }
  }

  function applyAgentHeartbeat(agent) {
    if (!$('#m-agent-heartbeat-enabled')?.checked) return;
    const heartbeat = {};
    const every = $('#m-agent-heartbeat-every').value.trim();
    if (every) heartbeat.every = every;
    const model = $('#m-agent-heartbeat-model').value.trim();
    if (model) heartbeat.model = model;
    const prompt = $('#m-agent-heartbeat-prompt').value;
    if (prompt.trim()) heartbeat.prompt = prompt;
    const target = $('#m-agent-heartbeat-target').value;
    if (target) heartbeat.target = target;
    const to = $('#m-agent-heartbeat-to').value.trim();
    if (to) heartbeat.to = to;
    const accountId = $('#m-agent-heartbeat-account-id').value.trim();
    if (accountId) heartbeat.account_id = accountId;
    const ackMaxChars = $('#m-agent-heartbeat-ack-max-chars').value.trim();
    if (ackMaxChars) {
      const parsed = Number(ackMaxChars);
      if (!Number.isInteger(parsed) || parsed <= 0) {
        throw new Error('Heartbeat ack max chars must be a positive integer');
      }
      heartbeat.ack_max_chars = parsed;
    }
    const directPolicy = $('#m-agent-heartbeat-direct-policy').value;
    if (directPolicy) heartbeat.direct_policy = directPolicy;
    const includeReasoning = readTriStateBool('m-agent-heartbeat-include-reasoning');
    if (includeReasoning !== null) heartbeat.include_reasoning = includeReasoning;
    const lightContext = readTriStateBool('m-agent-heartbeat-light-context');
    if (lightContext !== null) heartbeat.light_context = lightContext;
    const isolatedSession = readTriStateBool('m-agent-heartbeat-isolated-session');
    if (isolatedSession !== null) heartbeat.isolated_session = isolatedSession;
    const activeStart = $('#m-agent-heartbeat-active-start').value.trim();
    const activeEnd = $('#m-agent-heartbeat-active-end').value.trim();
    const activeTimezone = $('#m-agent-heartbeat-active-timezone').value.trim();
    if (activeStart || activeEnd || activeTimezone) {
      if (!activeStart || !activeEnd) {
        throw new Error('Heartbeat active hours require both start and end');
      }
      heartbeat.active_hours = {};
      heartbeat.active_hours.start = activeStart;
      heartbeat.active_hours.end = activeEnd;
      if (activeTimezone) heartbeat.active_hours.timezone = activeTimezone;
    }
    if (Object.keys(heartbeat).length === 0) {
      throw new Error('Set at least one heartbeat override or disable the heartbeat override toggle');
    }
    agent.heartbeat = heartbeat;
  }

  function buildAgentPayload(options = {}) {
    const id = $('#m-agent-id') ? $('#m-agent-id').value.trim() : '';
    const fallbackName = options.fallbackName || '';
    const name = $('#m-agent-name').value.trim() || fallbackName;
    const provider = $('#m-agent-provider').value;
    const model = resolveModelValue().trim();
    if (options.requireId && !id) {
      throw new Error('Agent ID is required');
    }
    if (!name) {
      throw new Error('Agent name is required');
    }
    if (!model) {
      throw new Error('Agent model is required');
    }
    const agent = {
      name,
      provider,
      model,
    };
    const thinkLevel = $('#m-agent-think-level').value;
    if (thinkLevel) agent.think_level = thinkLevel;
    const providerId = $('#m-agent-provider-id').value.trim();
    if (provider === 'custom') {
      if (!providerId) {
        throw new Error('Custom provider agents require a provider ID');
      }
      agent.provider_id = providerId;
    }
    const promptFile = $('#m-agent-prompt-file').value.trim();
    if (promptFile) agent.prompt_file = promptFile;
    const systemPrompt = $('#m-agent-system-prompt').value;
    if (systemPrompt.trim()) agent.system_prompt = systemPrompt;
    applyAgentBrowserProfile(agent);
    applyAgentHeartbeat(agent);
    return { id, agent };
  }

  async function renderDashboard(el) {
    const health = await GET('/health');
    const queue = await GET('/api/queue/status');
    const agents = await GET('/api/agents');
    const teams = await GET('/api/teams');
    const doctor = await GET('/api/doctor').catch(() => null);

    const components = health.components || {};
    const agentCount = Object.keys(agents.agents || {}).length;
    const teamCount = Object.keys(teams.teams || {}).length;
    const totalQueue = (queue.incoming || 0) + (queue.processing || 0) + (queue.outgoing || 0);

    el.innerHTML = `
      <div class="grid-4 mb-4">
        <div class="stat">
          <div class="stat-label">Agents</div>
          <div class="stat-value">${agentCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Teams</div>
          <div class="stat-value">${teamCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Queue Total</div>
          <div class="stat-value ${totalQueue > 0 ? 'yellow' : 'green'}">${totalQueue}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Dead Letter</div>
          <div class="stat-value ${(queue.dead_letter || 0) > 0 ? 'red' : 'green'}">${queue.dead_letter || 0}</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-header">Queue Breakdown</div>
          <div class="card-body">
            <table>
              <tr><td>Incoming</td><td style="text-align:right;font-weight:600">${queue.incoming || 0}</td></tr>
              <tr><td>Processing</td><td style="text-align:right;font-weight:600">${queue.processing || 0}</td></tr>
              <tr><td>Outgoing</td><td style="text-align:right;font-weight:600">${queue.outgoing || 0}</td></tr>
              <tr><td>Dead Letter</td><td style="text-align:right;font-weight:600">${queue.dead_letter || 0}</td></tr>
            </table>
          </div>

  /* Runs */
  function fmtDuration(ms) {
    if (!ms && ms !== 0) return '-';
    if (ms < 1000) return ms + 'ms';
    const sec = Math.round(ms / 1000);
    if (sec < 60) return sec + 's';
    const min = Math.floor(sec / 60);
    return min + 'm ' + (sec % 60) + 's';
  }

      text_chunk: '\u{1F4DD}',
      started: '\u{25B6}',
      completed: '\u{2705}',
      failed: '\u{274C}',
    };
    return icons[type] || '\u{2022}';
  }

  function renderEventContent(ev) {
    const d = ev.data || {};
    switch (ev.event_type) {
      case 'tool_call': {
        const phase = d.phase === 'completed' ? ' (done)' : '';
        const args = d.arguments ? `<pre class="event-pre">${escapeHtml(typeof d.arguments === 'string' ? d.arguments : JSON.stringify(d.arguments, null, 2))}</pre>` : '';
        return `<strong>${escapeHtml(d.name || 'tool')}</strong>${phase}${args}`;
      }
      case 'tool_result': {
        const output = d.output || '';
        return `<div class="event-output">${escapeHtml(truncate(output, 2000))}</div>`;
      }
      case 'agent_message': {
        const text = d.text || '';
        return text ? `<div class="event-message">${escapeHtml(truncate(text, 2000))}</div>` : '<em>started</em>';
      }
      case 'thinking':
        return `<div class="event-thinking">${escapeHtml(truncate(d.text || JSON.stringify(d), 1000))}</div>`;
      case 'completed': {
        const usage = d.usage;
        if (usage) {
          return `<span class="text-dim">input: ${usage.input_tokens || '?'}, output: ${usage.output_tokens || '?'}</span>`;
        }
        return '<em>completed</em>';
      }
      case 'failed':
        return `<span style="color:var(--red)">${escapeHtml(d.error || 'failed')}</span>`;
      case 'text_chunk':
        return `<span class="mono text-dim">${escapeHtml(truncate(d.text || JSON.stringify(d), 200))}</span>`;
      default:
        return `<pre class="event-pre">${escapeHtml(JSON.stringify(d, null, 2))}</pre>`;
    }
  }

  async function renderRunDetail(el) {
    if (!selectedRunId) {
      el.innerHTML = '<div class="empty">No run selected. <a href="#" onclick="backToRuns();return false">Back to runs</a></div>';
      return;
    }

    let run;
    try {
      run = await GET('/api/runs/' + selectedRunId);
    } catch {
      el.innerHTML = '<div class="empty">Run not found. <a href="#" onclick="backToRuns();return false">Back to runs</a></div>';
      return;
    }

    let eventsData;
    try {
      eventsData = await GET('/api/runs/' + selectedRunId + '/events');
    } catch {
      eventsData = { events: [] };
    }

    const events = eventsData.events || [];
    const isRunning = run.status === 'running' || run.status === 'pending';

    // Event type counts for filter bar
    const typeCounts = {};
    events.forEach(ev => { typeCounts[ev.event_type] = (typeCounts[ev.event_type] || 0) + 1; });
    const filterTypes = ['tool_call', 'tool_result', 'agent_message', 'thinking', 'completed', 'text_chunk'];

    const filteredEvents = runEventFilter
      ? events.filter(ev => ev.event_type === runEventFilter)
      : events;

    // Token summary from completed events
    let tokenSummary = '';
    const completedEv = events.find(ev => ev.event_type === 'completed' && ev.data && ev.data.usage);
    if (completedEv && completedEv.data.usage) {
      const u = completedEv.data.usage;
      tokenSummary = `<div class="token-summary">Tokens: ${u.input_tokens || '?'} in / ${u.output_tokens || '?'} out</div>`;
    }

    el.innerHTML = `
      <div style="margin-bottom:12px">
        <button class="btn btn-sm" onclick="backToRuns()">← Back to Runs</button>
        ${isRunning ? '<span class="badge badge-yellow" style="margin-left:8px;animation:pulse 1.5s infinite">Running</span>' : ''}
      </div>
      <div class="card">
        <div class="card-header">
          <span>Run ${truncate(run.run_id, 12)}</span>
          <span class="text-dim">${statusBadge(run.status)} ${fmtDuration(run.duration_ms)}</span>
        </div>
        <div class="card-body">
          <div class="grid-2" style="gap:8px;margin-bottom:12px">
            <div><strong>Agent:</strong> <span class="badge badge-blue">${escapeHtml(run.agent_id)}</span></div>
            <div><strong>Model:</strong> <span class="mono">${escapeHtml(run.model || '-')}</span></div>
            <div><strong>Provider:</strong> <span class="mono">${escapeHtml(run.provider || '-')}</span></div>
            <div><strong>Think Level:</strong> <span class="mono">${escapeHtml(run.think_level || '-')}</span></div>
            <div><strong>Events:</strong> <span class="mono">${run.event_count != null ? run.event_count : events.length}</span></div>
            <div><strong>Session:</strong> <span class="mono text-dim" title="${escapeHtml(run.session_key)}">${truncate(run.session_key, 30)}</span></div>
            <div><strong>Created:</strong> <span class="text-dim">${fmtDateTime(run.created_at)}</span></div>
          </div>
          ${tokenSummary}
          ${run.error ? `<div style="color:var(--red);margin-top:8px"><strong>Error:</strong> ${escapeHtml(run.error)}</div>` : ''}
        </div>
      </div>
      ${run.output ? `<div class="card" style="margin-top:12px">
        <div class="card-header"><span>Output</span></div>
        <div class="card-body"><pre class="event-pre" style="max-height:300px;overflow:auto">${escapeHtml(run.output)}</pre></div>
      </div>` : ''}
      ${run.stderr ? `<div class="card" style="margin-top:12px">
        <div class="card-header"><span>Stderr</span></div>
        <div class="card-body"><pre class="event-pre" style="max-height:200px;overflow:auto;color:var(--red)">${escapeHtml(run.stderr)}</pre></div>
      </div>` : ''}
      <div class="card" style="margin-top:12px">
        <div class="card-header">
          <span>Event Timeline (${filteredEvents.length}${runEventFilter ? ' filtered' : ''})</span>
        </div>
        <div class="card-body">
          <div class="event-filters">
            <button class="btn btn-sm ${!runEventFilter ? 'btn-primary' : ''}" onclick="setRunEventFilter(null)">All (${events.length})</button>
            ${filterTypes.filter(t => typeCounts[t]).map(t =>
              `<button class="btn btn-sm ${runEventFilter === t ? 'btn-primary' : ''}" onclick="setRunEventFilter('${t}')">${t.replace('_',' ')} (${typeCounts[t]})</button>`
            ).join('')}
          </div>
          <div class="event-timeline" id="event-timeline">
            ${filteredEvents.length === 0
              ? '<div class="empty">No events recorded</div>'
              : filteredEvents.map(ev => `
                <div class="event-entry event-${ev.event_type}">
                  <div class="event-header">
                    <span class="event-icon">${renderEventIcon(ev.event_type)}</span>
                    <span class="event-type">${ev.event_type.replace('_', ' ')}</span>
                    <span class="event-seq mono">#${ev.seq}</span>
                    <span class="event-time text-dim">${fmtTime(ev.timestamp)}</span>
                  </div>
                  <div class="event-body">${renderEventContent(ev)}</div>
                </div>
              `).join('')}
          </div>
        </div>
      </div>
    `;

    // Set up SSE for live updates if running
    if (isRunning) {
      connectRunEventStream();
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      pollTimer = setInterval(() => { if (currentPage === 'run-detail') renderRunDetail(el); }, 3000);
    }
  }

  function connectRunEventStream() {
    if (runEventSource) { runEventSource.close(); }
    try {
      runEventSource = new EventSource(apiUrl('/api/events/run-stream'));
      runEventSource.addEventListener('run_event', (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.run_id === selectedRunId) {
            appendRunEvent(ev);
          }
        } catch {}
      });
      runEventSource.onerror = () => {
        if (runEventSource) { runEventSource.close(); runEventSource = null; }
      };
    } catch {}
  }

  function appendRunEvent(ev) {
    if (runEventFilter && ev.event_type !== runEventFilter) return;
    const timeline = document.getElementById('event-timeline');
    if (!timeline) return;
    const empty = timeline.querySelector('.empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'event-entry event-' + ev.event_type;
    div.innerHTML = `
      <div class="event-header">
        <span class="event-icon">${renderEventIcon(ev.event_type)}</span>
        <span class="event-type">${ev.event_type.replace('_', ' ')}</span>
        <span class="event-seq mono">#${ev.seq}</span>
        <span class="event-time text-dim">${fmtTime(ev.timestamp)}</span>
      </div>
      <div class="event-body">${renderEventContent(ev)}</div>
    `;
    timeline.appendChild(div);
    timeline.scrollTop = timeline.scrollHeight;
  }

  /* Access */
  window._editingChannelAccess = null;

  function channelAccessOverridesFromConfig(config) {
    const channels = ((config || {}).channels) || {};
    return ['discord', 'slack', 'telegram'].flatMap(channel => {
      const access = (((channels[channel] || {}).access) || {});
      return Object.entries(access.channels || {})
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([id, rule]) => ({
          channel,
          id,
          allow: rule.allow !== false,
          require_mention: rule.require_mention,
          dm_policy: access.dm_policy || 'open',
          group_policy: access.group_policy || 'disabled',
        }));
    });
  }

  function ensureChannelAccessMap(config, channel) {
    config.channels = config.channels || {};
    config.channels[channel] = config.channels[channel] || {};
    config.channels[channel].access = config.channels[channel].access || {};
    config.channels[channel].access.channels = config.channels[channel].access.channels || {};
    return config.channels[channel].access.channels;
  }

  window.submitChannelAccessOverride = async function() {
    try {
      const channel = $('#m-access-channel').value;
      const id = $('#m-access-id').value.trim();
      if (!id) throw new Error('Channel ID is required');
      const settings = await GET('/api/settings');
      const config = settings.config || {};
      const original = window._editingChannelAccess;
      if (original && original.channel && original.id && (original.channel !== channel || original.id !== id)) {
        const previous = config.channels?.[original.channel]?.access?.channels;
        if (previous) delete previous[original.id];
      }
      const channels = ensureChannelAccessMap(config, channel);
      const rule = { allow: $('#m-access-allow').value === 'true' };
      const requireMention = $('#m-access-require-mention').value;
      if (requireMention !== '') rule.require_mention = requireMention === 'true';
      channels[id] = rule;
      await PUT('/api/settings', config);
      window._editingChannelAccess = null;
      closeModal();
      toast('Channel override saved', 'success');
      navigate('access');
    } catch (err) { toast(err.message, 'error'); }
  };

  window.deleteChannelAccessOverride = async function(channel, id) {
    if (!confirm(`Delete ${channel} override "${id}"?`)) return;
    try {
      const settings = await GET('/api/settings');
      const config = settings.config || {};
      const channels = config.channels?.[channel]?.access?.channels;
      if (!channels || !channels[id]) throw new Error('Channel override not found');
      delete channels[id];
      await PUT('/api/settings', config);
      toast('Channel override deleted', 'success');
      navigate('access');
    } catch (err) { toast(err.message, 'error'); }
  };

  /* Heartbeat */
  let heartbeatAgentId = '';

  function indicatorBadge(type) {
    if (!type) return '<span class="badge badge-gray">-</span>';
    if (type === 'ok') return '<span class="badge badge-green">ok</span>';
    if (type === 'sent') return '<span class="badge badge-blue">sent</span>';
    if (type === 'alert') return '<span class="badge badge-yellow">alert</span>';
    if (type === 'error') return '<span class="badge badge-red">error</span>';
    return `<span class="badge badge-gray">${escapeHtml(type)}</span>`;
  }

  function deliveryInfo(r) {
    const mode = r.delivery_mode || '-';
    if (mode === 'delivered' && r.delivery_channel) {
      return `${r.delivery_channel}` + (r.delivery_recipient ? ` → ${truncate(r.delivery_recipient, 20)}` : '');
    }
    if (mode === 'suppressed') return r.skip_reason === 'duplicate' ? 'suppressed (dup)' : 'suppressed';
    if (mode === 'no_target') return 'no target';
    return mode;
  }

  function heartbeatFlagBadge(label, enabled) {
    return `<span class="badge ${enabled ? 'badge-green' : 'badge-gray'}">${escapeHtml(label)}:${enabled ? 'on' : 'off'}</span>`;
  }

  function heartbeatTargetBadge(target) {

    return `<span class="badge ${value === 'none' ? 'badge-gray' : 'badge-blue'}">${escapeHtml(value)}</span>`;
  }

  function heartbeatActiveHoursSummary(activeHours) {
    if (!activeHours || (!activeHours.start && !activeHours.end)) {

  window.saveHeartbeatEnabled = async function() {
    try {

      const config = data.config || {};
      config.heartbeat = config.heartbeat || {};
      config.heartbeat.enabled = $('#heartbeat-enabled').checked;
      await PUT('/api/settings', config);
      toast('Heartbeat enabled setting saved', 'success');
      renderHeartbeat($('#page-container'));

    }

  window.saveAgentInterval = async function(agentId) {
    try {
      const input = document.querySelector(`[data-agent-interval="${agentId}"]`);
      if (!input) return;
      const every = input.value.trim();
      if (!every || !/^\d+[smh]?$/.test(every)) {
        throw new Error('Interval must be a duration like 30m, 1h, 300s');
      }
      const data = await GET('/api/settings');
      const config = data.config || {};
      if (!config.agents || !config.agents[agentId]) {
        throw new Error(`Agent "${agentId}" not found in config`);
      }
      config.agents[agentId].heartbeat = config.agents[agentId].heartbeat || {};
      config.agents[agentId].heartbeat.every = every;
      await PUT('/api/settings', config);
      toast(`Interval for ${agentId} saved: ${every}`, 'success');
      renderHeartbeat($('#page-container'));
    } catch (err) {
      toast(err.message, 'error');

  /* Settings */
  let settingsEditorState = null;

  function settingsDeepClone(value) {
    return JSON.parse(JSON.stringify(value || {}));
  }

  function settingsConfig() {
    return settingsEditorState?.config || {};
  }

  function ensureSettingsConfigShape() {
    const config = settingsConfig();
    config.browser = config.browser || {};
    config.browser.profiles = config.browser.profiles || {};
    config.custom_providers = config.custom_providers || {};
    config.channels = config.channels || {};

  function settingsValue(id) {
    return document.getElementById(id)?.value ?? '';
  }

  function settingsTrimmedValue(id) {
    return settingsValue(id).trim();
  }

  function settingsChecked(id) {
    return !!document.getElementById(id)?.checked;
  }

  function settingsOptionalString(id) {
    const value = settingsTrimmedValue(id);
    return value ? value : null;
  }

  function settingsRequiredString(id, label) {
    const value = settingsTrimmedValue(id);
    if (!value) throw new Error(`${label} is required`);
    return value;
  }

  function settingsRequiredInteger(id, label, min = 0, max = null) {
    const raw = settingsTrimmedValue(id);
    if (!raw) throw new Error(`${label} is required`);
    const value = Number(raw);
    if (!Number.isInteger(value)) {
      throw new Error(`${label} must be an integer`);
    }
    if (value < min || (max != null && value > max)) {
      if (max != null) {
        throw new Error(`${label} must be between ${min} and ${max}`);
      }
      throw new Error(`${label} must be at least ${min}`);
    }
    return value;
  }

  function settingsOptionalInteger(id, label, min = 0, max = null) {
    const raw = settingsTrimmedValue(id);
    if (!raw) return null;
    const value = Number(raw);
    if (!Number.isInteger(value)) {
      throw new Error(`${label} must be an integer`);
    }
    if (value < min || (max != null && value > max)) {
      if (max != null) {
        throw new Error(`${label} must be between ${min} and ${max}`);
      }
      throw new Error(`${label} must be at least ${min}`);
    }
    return value;
  }

  function settingsListValue(id) {
    return settingsValue(id)
      .split(/\r?\n|,/)
      .map(value => value.trim())
      .filter(Boolean);
  }

  function settingsToggleBlock(toggleId, blockId) {
    const block = document.getElementById(blockId);
    if (block) block.style.display = settingsChecked(toggleId) ? '' : 'none';
  }

  function settingsBindToggle(toggleId, blockId) {
    const toggle = document.getElementById(toggleId);
    if (!toggle) return;
    toggle.addEventListener('change', () => settingsToggleBlock(toggleId, blockId));
    settingsToggleBlock(toggleId, blockId);
  }

  function settingsCurrentBrowserDefaultProfile() {
    const input = document.getElementById('settings-browser-default-profile');
    if (input) return input.value.trim();
    return settingsConfig().browser?.default_profile || '';
  }

  function settingsAssignedAgentsForBrowserProfile(profileName) {
    const agents = Object.entries(settingsConfig().agents || {});
    return agents
      .filter(([, agent]) => agent.browser?.profile === profileName)
      .map(([agentId]) => agentId)
      .sort((a, b) => a.localeCompare(b));
  }

  function settingsAssignedAgentsForProvider(providerId) {
    const agents = Object.entries(settingsConfig().agents || {});
    return agents
      .filter(([, agent]) => agent.provider === 'custom' && agent.provider_id === providerId)
      .map(([agentId]) => agentId)
      .sort((a, b) => a.localeCompare(b));
  }

  function settingsCollectHeartbeatPolicy(prefix, label) {
    if (!settingsChecked(`${prefix}-enabled`)) return null;
    const heartbeat = {};
    const every = settingsOptionalString(`${prefix}-every`);
    if (every) heartbeat.every = every;
    const model = settingsOptionalString(`${prefix}-model`);
    if (model) heartbeat.model = model;
    const target = settingsOptionalString(`${prefix}-target`);
    if (target) heartbeat.target = target;
    const to = settingsOptionalString(`${prefix}-to`);
    if (to) heartbeat.to = to;
    const accountId = settingsOptionalString(`${prefix}-account-id`);
    if (accountId) heartbeat.account_id = accountId;
    const ackMaxChars = settingsOptionalInteger(`${prefix}-ack-max-chars`, `${label} ack max chars`, 1);
    if (ackMaxChars != null) heartbeat.ack_max_chars = ackMaxChars;
    const directPolicy = settingsOptionalString(`${prefix}-direct-policy`);
    if (directPolicy) heartbeat.direct_policy = directPolicy;
    const includeReasoning = readTriStateBool(`${prefix}-include-reasoning`);
    if (includeReasoning !== null) heartbeat.include_reasoning = includeReasoning;
    const lightContext = readTriStateBool(`${prefix}-light-context`);
    if (lightContext !== null) heartbeat.light_context = lightContext;
    const isolatedSession = readTriStateBool(`${prefix}-isolated-session`);
    if (isolatedSession !== null) heartbeat.isolated_session = isolatedSession;
    const prompt = settingsValue(`${prefix}-prompt`);
    if (prompt.trim()) heartbeat.prompt = prompt;
    const activeStart = settingsOptionalString(`${prefix}-active-start`);
    const activeEnd = settingsOptionalString(`${prefix}-active-end`);
    const activeTimezone = settingsOptionalString(`${prefix}-active-timezone`);
    if (activeStart || activeEnd || activeTimezone) {
      if (!activeStart || !activeEnd) {
        throw new Error(`${label} active hours require both start and end`);
      }
      heartbeat.active_hours = { start: activeStart, end: activeEnd };
      if (activeTimezone) heartbeat.active_hours.timezone = activeTimezone;
    }
    if (!Object.keys(heartbeat).length) {
      throw new Error(`Set at least one value for ${label} or disable that section`);
    }
    return heartbeat;
  }

    if (!settingsChecked(`${prefix}-heartbeat-enabled`)) return null;

    const showAlerts = readTriStateBool(`${prefix}-heartbeat-show-alerts`);

    if (showOk !== null) heartbeat.show_ok = showOk;
    if (showAlerts !== null) heartbeat.show_alerts = showAlerts;
    if (useIndicator !== null) heartbeat.use_indicator = useIndicator;
    if (!Object.keys(heartbeat).length) {
      throw new Error(`Set at least one heartbeat visibility value for ${label} or disable that section`);
    }
    return heartbeat;
  }

  function settingsEffectiveChannelAccess(channelKey, channelConfig) {
    const access = channelConfig?.access;
    if (access) return access;
    if (channelKey === 'discord') {
      return {
        dm_policy: 'open',
        group_policy: channelConfig?.mention_only ? 'mention_only' : 'open',
        allow_from: [],
        group_allow_from: [],
        channels: {},
      };

    return {
      dm_policy: 'open',
      group_policy: 'mention_only',
      allow_from: [],
      group_allow_from: [],
      channels: {},
    };
  }

    const enabled = !!channelConfig;

                <div class="form-row"><label class="form-label">Bot Token Env</label><input class="form-input" id="settings-channel-${channelKey}-bot-token-env" value="${escapeHtml(channel.bot_token_env || '')}" placeholder="${channelKey.toUpperCase()}_BOT_TOKEN"></div>

                <label style="display:inline-flex;align-items:center;gap:8px">

  function settingsCollectChannelAccess(channelKey, previousConfig) {
    const previousChannels = previousConfig?.access?.channels || {};
    const accessEnabled = settingsChecked(`settings-channel-${channelKey}-access-enabled`);
    if (!accessEnabled && !Object.keys(previousChannels).length) return null;

    const access = settingsEffectiveChannelAccess(channelKey, previousConfig);
    const next = {
      dm_policy: accessEnabled ? settingsRequiredString(`settings-channel-${channelKey}-dm-policy`, `${channelKey} DM policy`) : access.dm_policy,
      group_policy: accessEnabled ? settingsRequiredString(`settings-channel-${channelKey}-group-policy`, `${channelKey} group policy`) : access.group_policy,
      allow_from: accessEnabled ? settingsListValue(`settings-channel-${channelKey}-allow-from`) : [],
      group_allow_from: accessEnabled ? settingsListValue(`settings-channel-${channelKey}-group-allow-from`) : [],
      channels: settingsDeepClone(previousChannels),
    };

    const hasMeaningful =
      next.dm_policy !== access.dm_policy ||
      next.group_policy !== access.group_policy ||
      next.allow_from.length > 0 ||
      next.group_allow_from.length > 0 ||
      Object.keys(next.channels).length > 0;

    return hasMeaningful ? next : null;
  }

  function settingsCollectChannelConfig(channelKey, previousConfig) {
    if (!settingsChecked(`settings-channel-${channelKey}-enabled`)) return null;

    const next = settingsDeepClone(previousConfig || {});
    next.bot_token = settingsOptionalString(`settings-channel-${channelKey}-bot-token`);
    next.bot_token_env = settingsOptionalString(`settings-channel-${channelKey}-bot-token-env`);

    if (channelKey === 'discord') {
      next.guild_id = settingsOptionalString(`settings-channel-${channelKey}-guild-id`);
      next.mention_only = settingsChecked(`settings-channel-${channelKey}-mention-only`);
    }

    if (channelKey === 'slack') {
      next.app_token = settingsOptionalString(`settings-channel-${channelKey}-app-token`);
      next.app_token_env = settingsOptionalString(`settings-channel-${channelKey}-app-token-env`);
    }

    const access = settingsCollectChannelAccess(channelKey, previousConfig);
    if (access) next.access = access;
    else delete next.access;

    const heartbeat = settingsCollectChannelHeartbeat(`settings-channel-${channelKey}`, `${channelKey} heartbeat`);

  window.showEditBrowserProfileModal = function(profileName) {

  window.submitBrowserProfileModal = function() {
    try {
      const config = ensureSettingsConfigShape();
      const existingName = settingsTrimmedValue('settings-browser-profile-existing-name');
      const name = settingsRequiredString('settings-browser-profile-name', 'Browser profile name');
      if (!/^[A-Za-z0-9_-]+$/.test(name)) {
        throw new Error('Browser profile names may only contain letters, numbers, "_" and "-"');
      }
      if (existingName !== name && config.browser.profiles[name]) {
        throw new Error(`Browser profile already exists: ${name}`);
      }

      const profile = {
        cdp_port: settingsRequiredInteger('settings-browser-profile-cdp-port', 'Browser profile CDP port', 1, 65535),
        profile_dir: settingsRequiredString('settings-browser-profile-profile-dir', 'Browser profile directory'),
        display: settingsRequiredString('settings-browser-profile-display', 'Browser profile display'),
        kasm_port: settingsRequiredInteger('settings-browser-profile-kasm-port', 'Browser profile Kasm port', 1, 65535),
      };
      const viewPath = settingsOptionalString('settings-browser-profile-view-path');
      if (viewPath) {
        if (!viewPath.startsWith('/')) throw new Error('Browser profile view path must start with "/"');
        profile.view_path = viewPath;
      }
      const osUser = settingsOptionalString('settings-browser-profile-os-user');
      if (osUser) profile.os_user = osUser;
      const homeDir = settingsOptionalString('settings-browser-profile-home-dir');
      if (homeDir) profile.home_dir = homeDir;
      const driver = settingsOptionalString('settings-browser-profile-driver');
      if (driver) profile.driver = driver;

      if (existingName && existingName !== name) {
        delete config.browser.profiles[existingName];
        if (config.browser.default_profile === existingName) config.browser.default_profile = name;
        Object.values(config.agents || {}).forEach(agent => {
          if (agent.browser?.profile === existingName) {
            agent.browser.profile = name;
          }
        });
        if (settingsTrimmedValue('settings-browser-default-profile') === existingName) {
          document.getElementById('settings-browser-default-profile').value = name;
        }
      }

      config.browser.profiles[name] = profile;
      refreshSettingsBrowserProfilesPanel();
      closeModal();
      toast('Browser profile updated in pending settings', 'success');
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  window.deleteBrowserProfile = function(profileName) {
    const config = ensureSettingsConfigShape();
    const assigned = settingsAssignedAgentsForBrowserProfile(profileName);
    const wasDefault = config.browser.default_profile === profileName || settingsTrimmedValue('settings-browser-default-profile') === profileName;
    let message = `Delete browser profile "${profileName}" from the pending settings?`;
    if (assigned.length || wasDefault) {
      message += `\n\nThis will clear ${assigned.length ? 'agent assignments' : 'the default profile'} for this profile.`;
    }
    if (!confirm(message)) return;

    delete config.browser.profiles[profileName];
    if (config.browser.default_profile === profileName) config.browser.default_profile = null;
    if (settingsTrimmedValue('settings-browser-default-profile') === profileName) {
      document.getElementById('settings-browser-default-profile').value = '';
    }
    Object.values(config.agents || {}).forEach(agent => {
      if (agent.browser?.profile === profileName) {
        delete agent.browser.profile;
        if (!Object.keys(agent.browser).length) delete agent.browser;
      }
    });
    refreshSettingsBrowserProfilesPanel();
    toast('Browser profile removed from pending settings', 'success');
  };

      if (!/^[A-Za-z0-9_-]+$/.test(providerId)) {
