                      ${['main','per-peer','per-channel-peer','per-account-channel-peer'].map(value => `<option value="${value}" ${value === (session.dm_scope || 'per-channel-peer') ? 'selected' : ''}>${value}</option>`).join('')}
                    </select>
                  </div>
                  <div class="form-row"><label class="form-label">Main Session Key</label><input class="form-input" id="settings-session-main-key" value="${escapeHtml(session.main_key || '')}" placeholder="main"></div>
                  <div class="form-row"><label class="form-label">Max Chain Steps</label><input class="form-input" id="settings-chain-max-chain-steps" type="number" min="1" value="${chain.max_chain_steps || ''}"></div>
                </div>
              </div>
              <div class="settings-subsection">
                <div class="settings-subtitle">Runner</div>
                <div class="settings-inline-grid">
                  <div class="form-row"><label class="form-label">Default Provider</label>
                    <select class="form-select" id="settings-runner-default-provider">
                      ${['anthropic','openai','custom','mock'].map(value => `<option value="${value}" ${value === (runner.default_provider || 'anthropic') ? 'selected' : ''}>${value}</option>`).join('')}
                    </select>
                  </div>
                  <div class="form-row"><label class="form-label">Timeout (sec)</label><input class="form-input" id="settings-runner-timeout-sec" type="number" min="1" value="${runner.timeout_sec || ''}"></div>
                  <div class="form-row"><label class="form-label">Default Team</label>
                    <select class="form-select" id="settings-default-team">
                      <option value="">None</option>
                      ${teams.map(teamId => `<option value="${teamId}" ${teamId === (config.default_team || '') ? 'selected' : ''}>${teamId}</option>`).join('')}
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">Heartbeat</div>
            <div class="card-body">
              <div class="settings-subsection">
                <div class="settings-subtitle">Global Loop</div>
                <div class="settings-inline-grid">
                  <div class="form-row">
                    <label class="form-label" for="settings-heartbeat-enabled">Enabled</label>
                    <label style="display:inline-flex;align-items:center;gap:8px">
                      <input type="checkbox" id="settings-heartbeat-enabled" ${heartbeat.enabled ? 'checked' : ''}>
                      <span class="text-dim">Master switch for scheduled heartbeats</span>
                    </label>
                  </div>
                  <div class="form-row"><label class="form-label">Interval (sec)</label><input class="form-input" id="settings-heartbeat-interval-sec" type="number" min="1" value="${heartbeat.interval_sec || ''}"></div>
                  <div class="form-row"><label class="form-label">Sender</label><input class="form-input" id="settings-heartbeat-sender" value="${escapeHtml(heartbeat.sender || '')}" placeholder="Heartbeat"></div>
                </div>
              </div>
              <div class="settings-subsection">
                <div class="settings-subtitle">Agent Defaults</div>
                ${renderSettingsHeartbeatPolicyEditor('settings-agent-defaults-heartbeat', config.agent_defaults?.heartbeat, 'Store shared heartbeat defaults for agents')}
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">Pairing</div>
            <div class="card-body">
              <div class="settings-inline-grid">
                <div class="form-row"><label class="form-label">Code Length</label><input class="form-input" id="settings-pairing-code-length" type="number" min="1" value="${pairing.code_length || ''}"></div>
                <div class="form-row"><label class="form-label">Code TTL (sec)</label><input class="form-input" id="settings-pairing-code-ttl-secs" type="number" min="1" value="${pairing.code_ttl_secs || ''}"></div>
                <div class="form-row"><label class="form-label">Max Failed Attempts</label><input class="form-input" id="settings-pairing-max-failed-attempts" type="number" min="1" value="${pairing.max_failed_attempts || ''}"></div>
                <div class="form-row"><label class="form-label">Lockout (sec)</label><input class="form-input" id="settings-pairing-lockout-secs" type="number" min="1" value="${pairing.lockout_secs || ''}"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span>Browser Profiles</span>
            <button class="btn btn-sm" onclick="showCreateBrowserProfileModal()">+ Add Profile</button>
          </div>
          <div class="card-body">
            <div class="form-row"><label class="form-label">Default Profile</label><input class="form-input" id="settings-browser-default-profile" value="${escapeHtml(config.browser.default_profile || '')}" placeholder="optional" oninput="refreshSettingsBrowserProfilesPanel()"></div>
            <div class="settings-help" style="margin-bottom:12px">Agents without an explicit browser profile fall back to this profile.</div>
            <div id="settings-browser-profiles-panel">${renderSettingsBrowserProfilesPanel()}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span>Custom Providers</span>
            <button class="btn btn-sm" onclick="showCreateCustomProviderModal()">+ Add Provider</button>
          </div>
          <div class="card-body">
            <div class="settings-help" style="margin-bottom:12px">These provider definitions are referenced by agents with <code>provider = "custom"</code>.</div>
            <div id="settings-custom-providers-panel">${renderSettingsCustomProvidersPanel()}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Channel Defaults</div>
          <div class="card-body">
            <div class="settings-help" style="margin-bottom:12px">Only heartbeat visibility defaults are shared across channels. Per-channel access overrides remain on the Access page.</div>
            ${renderSettingsChannelHeartbeatEditor('settings-channels-defaults', config.channels.defaults?.heartbeat, 'Store default heartbeat visibility for all channels')}
          </div>
        </div>

        <div class="grid-2">
          ${renderSettingsChannelCard('telegram', 'Telegram', config.channels.telegram)}
          ${renderSettingsChannelCard('discord', 'Discord', config.channels.discord)}
          ${renderSettingsChannelCard('slack', 'Slack', config.channels.slack)}
        </div>

        <div class="card">
          <div class="card-header">Advanced JSON</div>
          <div class="card-body">
            <div class="settings-help" style="margin-bottom:12px">Fallback editor for raw config JSON. This reflects the last saved or loaded config; structured edits above are only merged in after pressing Save Settings.</div>
            <textarea class="form-textarea" id="settings-json" style="min-height:320px;font-family:'SF Mono','Menlo',monospace;font-size:12px">${escapeHtml(JSON.stringify(config, null, 2))}</textarea>
            <div class="settings-toolbar" style="margin-top:12px">
              <button class="btn" onclick="renderSettings($('#page-container'))">Reload Form</button>
              <button class="btn btn-primary" onclick="saveSettingsJson()">Save JSON</button>
            </div>
          </div>
        </div>
      </div>`;

    bindSettingsToggles();
  }

  window.saveSettings = async function() {
    try {
      const payload = buildStructuredSettingsPayload();
      const response = await PUT('/api/settings', payload);
      settingsEditorState = {
        config: settingsDeepClone(response.config || payload),
        configPath: settingsEditorState?.configPath || '',
        runtime: response.runtime || settingsEditorState?.runtime || {},
      };
      toast('Settings saved (restart runtime for full effect)', 'success');
      await renderSettings($('#page-container'));
    } catch (err) { toast(err.message, 'error'); }
  };

  window.saveSettingsJson = async function() {
    try {
      const json = JSON.parse($('#settings-json').value);
      const response = await PUT('/api/settings', json);
      settingsEditorState = {
        config: settingsDeepClone(response.config || json),
        configPath: settingsEditorState?.configPath || '',
        runtime: response.runtime || settingsEditorState?.runtime || {},
      };
      toast('JSON settings saved (restart runtime for full effect)', 'success');
      await renderSettings($('#page-container'));
    } catch (err) { toast(err.message, 'error'); }
  };

  /* Chatroom */
  let chatTeamId = null;

  async function renderChatroom(el) {
    const teamsData = await GET('/api/teams');
    const teamIds = Object.keys(teamsData.teams || {});

    if (teamIds.length === 0) {
      el.innerHTML = '<div class="empty">No teams configured</div>';
      return;
    }

    if (!chatTeamId || !teamIds.includes(chatTeamId)) chatTeamId = teamIds[0];

    el.innerHTML = `
      <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <label class="form-label" style="margin:0">Team:</label>
        <select class="form-select" id="chat-team-select" style="width:auto" onchange="switchChatTeam(this.value)">
          ${teamIds.map(t => `<option value="${t}" ${t===chatTeamId?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 220px);padding:16px">
        <div id="chatroom-messages-container" style="flex:1;overflow-y:auto"></div>
        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
          <textarea
            class="form-textarea"
            id="chatroom-input"
            placeholder="Post an update to the whole team"
            style="min-height:96px"
          ></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button class="btn btn-primary" onclick="sendChatroomMessage()">Send</button>
          </div>
        </div>
      </div>`;

    loadChatroomMessages();
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    pollTimer = setInterval(() => { if (currentPage === 'chatroom') loadChatroomMessages(); }, 5000);
  }

  window.switchChatTeam = function(id) {
    chatTeamId = id;
    loadChatroomMessages();
  };

  function renderChatroomMessage(message) {
    const body = escapeHtml(message.message || '').replace(/\n/g, '<br>');
    return `
      <div class="chain-step">
        <div class="chain-step-header">
          <span class="chain-step-agent">${escapeHtml(message.from_agent || 'unknown')}</span>
          <span class="text-muted" style="margin-left:auto">${fmtDateTime(message.created_at)}</span>
        </div>
        <div class="chain-step-body" style="white-space:normal">${body}</div>
      </div>`;
  }

  async function loadChatroomMessages() {
    if (!chatTeamId) return;
    try {
      const data = await GET(`/api/chatroom/${chatTeamId}?limit=100`);
      const messages = data.messages || [];
      const container = $('#chatroom-messages-container');
      if (!container) return;

      container.innerHTML = messages.length === 0
        ? '<div class="empty">No chatroom messages yet</div>'
        : messages.map(renderChatroomMessage).join('');

      container.scrollTop = container.scrollHeight;
    } catch { /* ignore */ }
  }

  window.sendChatroomMessage = async function() {
    if (!chatTeamId) return;
    const input = $('#chatroom-input');
    const message = (input && input.value || '').trim();
    if (!message) {
      toast('Message is empty', 'error');
      return;
    }

    try {
      await POST(`/api/chatroom/${chatTeamId}`, { message });
      input.value = '';
      await loadChatroomMessages();
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  /* ── SSE ── */
  function connectSSE() {
    const dot = $('#sse-dot');
    const label = $('#sse-label');

    const url = apiUrl('/api/events/stream');
    const source = new EventSource(url);

    source.onopen = () => {
      dot.className = 'status-dot ok';
      label.textContent = 'Connected';
    };

    source.onerror = () => {
      dot.className = 'status-dot error';
      label.textContent = 'Disconnected';
      source.close();
      setTimeout(connectSSE, 3000);
    };

    source.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.event_type) {
          if (data.event_type === 'chatroom_message_posted' && currentPage === 'chatroom') {
            if (!data.payload || !data.payload.team_id || data.payload.team_id === chatTeamId) {
              loadChatroomMessages();
            }
            return;
          }

          if ((data.event_type === 'heartbeat_run_succeeded' || data.event_type === 'heartbeat_run_failed') && currentPage === 'heartbeat') {
            renderHeartbeat($('#page-container'));
            return;
          }

          if (data.event_type === 'settings_updated' && currentPage === 'heartbeat') {
            renderHeartbeat($('#page-container'));
            return;
          }

          const refreshPages = {
            agent_created: 'agents', agent_updated: 'agents', agent_deleted: 'agents',
            team_created: 'teams', team_updated: 'teams', team_deleted: 'teams',
            binding_created: 'bindings', binding_updated: 'bindings', binding_deleted: 'bindings',
            settings_updated: 'settings',
            sender_access_approved: 'access', sender_access_rejected: 'access',
            manual_response_queued: 'responses',
          };
          if (refreshPages[data.event_type] === currentPage) {
            renderPage(currentPage);
          }
        }
      } catch { /* ignore */ }
    };
  }

  /* ── Theme ── */
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = $('#theme-toggle');
    if (btn) btn.innerHTML = theme === 'dark' ? '&#9790;' : '&#9728;';
  }

  function initTheme() {
    const saved = localStorage.getItem('clawpod-theme');
    if (saved) {
      applyTheme(saved);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      applyTheme('light');
    }
  }

  window.toggleTheme = function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('clawpod-theme', next);
  };

  /* ── Mobile sidebar ── */
  window.toggleSidebar = function() {
    $('.sidebar').classList.toggle('open');
    $('#sidebar-overlay').classList.toggle('open');
  };
  window.closeSidebar = function() {
    $('.sidebar').classList.remove('open');
    $('#sidebar-overlay').classList.remove('open');
  };

  /* ── Init ── */
  initTheme();
  const initialPage = pageFromPath();
  history.replaceState({ page: initialPage }, '', '/office/' + initialPage);
  navigate(initialPage, false);
  connectSSE();
})();
</script>
</body>
</html>
